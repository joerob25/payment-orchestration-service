server:
  port: 18001

spring:
  application:
    name: payment-orchestration-service
  threads:
    virtual:
      enabled: true

logging:
  pattern:
    level: "%5p [%X{traceId},%X{spanId}]"

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
